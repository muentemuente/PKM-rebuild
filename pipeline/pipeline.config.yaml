# =============================================================================
# PKM-rebuild Pipeline-Konfiguration
# =============================================================================
# Stand: 2026-05-25
# Konsumiert von: pipeline/config.py (Pydantic-Settings)
# Doku: docs/02_pipeline_spec.md
#
# WICHTIG: Schwellwerte hier — nicht im Code. Magic Numbers sind verboten.
# =============================================================================


# === Pfade ====================================================================
# Pfade leben NICHT mehr hier, sondern zentral in pipeline/_paths.py (Single Source).
# Layout: ~/projects/aktiv/pkm-pipeline/{input,work,drafts,review,output,archive}
# Override per Env-Variable: PKM_PIPELINE_ROOT (Daten), PKM_REPO_ROOT (Repo).
# In dieser YAML auflösbare ${var}: data_root input work drafts review output
# archive config backups + Legacy-Aliasse inbox/corpus_input/pipeline_output/vault.


# === Pipeline-Versionierung ===================================================
pipeline:
  version: "0.1.0"
  schema_version: "v1"          # bei Schema-Bump in pipeline/schemas.py inkrementieren


# === Sample-Modus =============================================================
sample:
  enabled: false                # via CLI-Flag --sample N überschreibbar
  count: 10


# === Inventar (Phase 1) =======================================================
inventory:
  recursive: true
  follow_symlinks: false
  exclude_patterns:
    - ".*"                      # Hidden Files
    - "_*"                      # Underscore-Prefix (Index-Files etc.)
    - "node_modules/*"
    - ".git/*"
  include_extensions:
    - ".md"


# === Normalisierung (Phase 2) =================================================
normalization:
  target_encoding: "utf-8"
  line_endings: "lf"            # CRLF/CR → LF
  tab_replacement: "    "       # Tab → 4 Spaces (außer in Code-Blöcken)
  max_blank_lines: 3            # 4+ Leerzeilen werden auf 3 reduziert
  strip_trailing_whitespace: true
  parse_frontmatter: true       # YAML-Frontmatter extrahieren


# === Strukturextraktion (Phase 3) =============================================
structure:
  extract_headings: true
  extract_code_blocks: true
  extract_tables: true
  extract_links: true
  extract_images: true
  guess_doc_type: true          # heuristische Typ-Vermutung (Pipeline-intern, nicht im Vault)
  book_word_threshold: 8000     # files >= dieser Wortzahl + 5+ H1/H2 → label "book"


# === Segmentierung (Phase 4) ==================================================
segmentation:
  min_words_per_segment: 150    # Gate-1 (2026-05-28): erhöht von 50, Heading-Echo eliminieren
  max_words_per_segment: 1500
  target_words_per_segment: 900
  preserve_code_blocks: true    # Code-Block niemals zerreißen
  preserve_tables: true
  preserve_lists: true
  split_by_headings: true       # primäre Trenn-Strategie
  book_max_words_per_segment: 5000
  book_split_levels: [1, 2]     # bei books nach H1+H2 splitten


# === Redundanz-Erkennung (Phase 5) ============================================
redundancy:
  # Stufe 1: SHA-256 auf normalisiertem Doc-Text
  exact_match:
    enabled: true

  # Stufe 2: TF-IDF auf Segment-Ebene
  tfidf:
    enabled: true
    threshold: 0.72             # Cosine-Similarity ab der Kanten gezogen werden
    ngram_range: [1, 2]
    max_features: 20000
    min_df: 2                   # Term muss in ≥2 Docs vorkommen


# === Redundanz-/Synthese-Erkennung (WP2, Detection + Report) ==================
# Doc-Ebene über einen bestehenden Vault (read-only). KEIN Auto-Merge/Vector-DB.
# Schwellen sind initiale Defaults (REVIEW-Gate 2 / Architektur-Weiche): an einer
# Report-Stichprobe bestätigen/tunen. Korpus-Finding: 96,5 % Paare < 0,6 →
# erwartet kleine, hochsignifikante Kandidatenmenge (gewollt).
redundancy_scan:
  tfidf_threshold: 0.72           # near-dup (lexikalisch); konsistent mit redundancy.tfidf.threshold
  embedding_dup_threshold: 0.85   # semantische Dublette (Embedding hoch)
  # thematic_low: Sweep auf 186 Brain-Vault-Docs (2026-06-16) — 0.60 verbindet 143
  # Docs zu EINEM Hairball (Ø-Sim 0.36); ab 0.70 zerfällt er in fokussierte 3-5-Doc-
  # Kandidaten (0.70→11, 0.72→8, 0.75→2, 0.80→0). 0.70 in REVIEW-Gate 2 bestätigt
  # (2026-06-16): fokussierteste, vollständige Kandidatenmenge.
  embedding_thematic_low: 0.70    # Untergrenze thematisches Mittelband [0.70, 0.85)
  synthesis_min_members: 3        # Synthese-Kandidat: Komponente >= N Docs
  use_embeddings: true            # False = nur Hash + TF-IDF (kein mpnet nötig)
  qwen_evaluate: false            # optionale Qwen-Paar-Bewertung (Default aus — teuer/Hang-Risiko)


# === Embeddings (Phase 6) =====================================================
embeddings:
  enabled: true
  model: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
  batch_size: 32
  device: "mps"                 # macOS MPS-Backend; Fallback "cpu"
  similarity_threshold: 0.65    # Gate-1 (2026-05-29): 0.75 überstreut (85.9% unsortiert) → zurück auf 0.65
  cache_path: "${pipeline_output}/embeddings.parquet"


# === Cluster (Phase 6) ========================================================
# Embedding-/HDBSCAN-Clustering ist verworfen (R9). Phase 6 nutzt nur noch
# min_cluster_size (Komponenten < min → "unsortiert/"); initial_strategy und der
# UMAP+HDBSCAN-Block (Phase 7b) sind entfernt.
clustering:
  min_cluster_size: 3           # bottom-up Regel: <3 Files → "unsortiert/"


# === LLM-Batch-Bildung (Phase 7) ==============================================
batching:
  max_input_tokens: 35000       # 50K-Kontext − Reasoning-Output-Raum (gemessen Block 0.D)
  token_estimation_model: "qwen/qwen3.6-27b"
  split_oversized_clusters: true


# === Qwen (Phase 8) ===========================================================
qwen:
  endpoint: "http://localhost:1234/v1"   # LM Studio default
  model: "qwen/qwen3.6-27b"
  context_window: 49152         # ~50K — Hard Limit auf 32 GB RAM (gemessen Block 0.D)
  prompt_version: "v1"          # aktive Version, korrespondiert mit prompts/v1/
  json_mode: false               # inkompatibel mit LM Studio + Reasoning-Modell (Block 0.D); Outputs werden frei geparst
  max_retries: 2
  retry_backoff_seconds: 5
  timeout_seconds: 1200          # Pro Qwen-Call; Pragmatik-Bump (WP3c-3): non-thinking ist schnell, Puffer für große Files

  # Temperaturen pro Stage (siehe docs/04_qwen_prompts.md)
  # Option B (1 Doc → 1 Concept): nur Stage 3 (Synthese) + Stage 4 (Frontmatter).
  # stage1/stage2 (Cluster-/Merge-Stages) entfallen und sind entfernt.
  temperature:
    stage3_synthesis: 0.4
    stage4_frontmatter: 0.1

  # max_tokens pro Stage: Reasoning-Overhead ~93%, daher 10x erwarteter Content
  max_tokens:
    stage3: 16000                  # Höchster Bedarf: vollständiger Markdown-Body, Context-Window 49152
    stage4: 10000

  # restructure-Pfad (WP3c): Reasoning aus + Sampler, isoliert von Phase 8.
  # reasoning_effort:"none" schaltet das Reasoning real ab (reasoning_tokens=0, WP3c-3
  # verifiziert; enable_thinking/​/no_think werden auf diesem Stack ignoriert).
  # Sampler = empfohlene non-thinking-Werte (Qwen3 docs). max_tokens nur Content.
  restructure:
    reasoning_effort: "none"
    temperature: 0.7
    top_p: 0.8
    presence_penalty: 1.5
    max_tokens_stage3: 4000        # nur Content-Body (kein 16000-Reasoning-Budget)
    max_tokens_stage4: 2000


# === Vault-Aufbau (Phase 9) ===================================================
vault:
  use_cluster_number_prefix: true   # Ordner heißen "02_Webentwicklung/" (UX)
  generate_cluster_index: true      # _index.md pro Cluster automatisch
  validate_wikilinks: true          # broken links → Warning
  attic_folder: "_attic"            # für deprecated
  unsorted_folder: "17_unsortiert"  # regulärer Cluster (Mapping-Lücke / Domäne ohne eigenen Ordner)
  unsorted_warn_threshold: 10       # build-vault: Warnung, wenn 17_unsortiert mehr Artikel hat (passives Surfacing, kein P4)
  repair_on_build: true             # S1/G1: Safe-Tier-repair_text (entbolden/Junk-Heading/Setext/PUA/Fence-Tag/unclosed-Fence) auf jeden Body beim Build nach output/ (single-pass). Nur output/, nie der Live-Vault. false → Build ohne Auto-Repair
  format_on_build: true             # S2/G2: safe-tier-mdformat NACH repair (Reihenfolge repair→format). Nur übernommen, wenn kein Schutzbereich berührt + Code-Fences/Tabellen byte-identisch. Nur output/, nie der Live-Vault. false → Build ohne Auto-Format
  audit_on_build: true              # S3/G4: read-only Audit-Pass über das gebaute output/ nach repair+format (Safe-Tier-Rest/parse-errors/dangling als audit_*-Summary). Mutiert nichts. false → kein Post-Build-Audit


# === Tag-Vokabular ============================================================
tags:
  vocabulary_file: "${config}/tag_vocabulary.yaml"   # Single Source (YAML); _paths.TAG_VOCABULARY_FILE
  strict_vocabulary: false      # initial false (Vokabular-Pflege über Gate C / manage_vocab)
  max_tags_per_article: 10
  min_tags_per_article: 2


# === Logging ==================================================================
logging:
  level: "INFO"                 # DEBUG | INFO | WARNING | ERROR | CRITICAL
  console_rich: true            # rich-Formatierung in der Konsole
  file_json: true               # strukturierte JSON-Logs
  file_path: "${work}/pipeline.log"
  log_meta_files: true          # *.meta.json pro Output (Idempotenz-Tracking)


# === Idempotenz ===============================================================
idempotency:
  enabled: true
  hash_algorithm: "sha256"
  meta_file_suffix: ".meta.json"


# === Memory-Pressure-Detection (macOS) ========================================
memory_watch:
  enabled: true
  warn_threshold_percent: 85    # bei >85% Memory-Used: Warning
  pause_threshold_percent: 95   # bei >95%: Pipeline pausiert, User-Prompt
  check_interval_seconds: 30
